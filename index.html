<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美国经济宏观驾驶舱 - 国内优化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(148, 163, 184, 0.2); }
        .metric-card { transition: all 0.3s; }
        .metric-card:hover { transform: translateY(-2px); }
        .demo-badge { font-size: 10px; background: rgba(234, 179, 8, 0.2); color: #eab308; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .live-badge { font-size: 10px; background: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .static-badge { font-size: 10px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .warning-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body class="p-4 max-w-7xl mx-auto">
    
    <!-- 网络状态提示 -->
    <div id="network-status" style="display:none; background: linear-gradient(90deg, #3b82f6, #2563eb); color: white; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 13px;">
        <span id="status-text">正在加载数据...</span>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">Macro Dashboard <span class="text-green-400 text-sm" id="connStatus">● 连接中...</span></h1>
        <div class="flex gap-2 text-xs text-slate-400">
            <span>权重: 曲线35% | 政策25% | 萨姆20% | CFNAI15% | 信用5%</span>
            <button onclick="location.reload()" class="px-3 py-1 text-xs bg-blue-600 hover:bg-blue-500 rounded text-white transition">刷新数据</button>
        </div>
    </div>

    <!-- Score Panel -->
    <div class="glass rounded-lg p-6 mb-6" id="scorePanel">
        <div class="flex justify-between items-center">
            <div>
                <h3 class="text-slate-400 text-sm">衰退概率评分 <span class="text-xs opacity-50">(优化算法)</span></h3>
                <div class="text-4xl font-bold text-white mt-1" id="recessionScore">--%</div>
            </div>
            <div id="cycleStatus" class="px-4 py-2 rounded-lg text-sm font-bold bg-slate-700">等待数据...</div>
        </div>
        <div class="mt-4 text-sm text-slate-300" id="analysisText">正在获取数据...</div>
        <div class="mt-3 pt-3 border-t border-slate-700 text-xs text-slate-500" id="scoreBreakdown"></div>
    </div>

    <!-- Metrics Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-6" id="metricsGrid"></div>

    <!-- Charts Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">收益率曲线 (10Y-2Y) <span id="status1"></span></h4>
            <div class="relative h-64"><canvas id="chart1"></canvas></div>
        </div>
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">失业率趋势 <span id="status2"></span></h4>
            <div class="relative h-64"><canvas id="chart2"></canvas></div>
        </div>
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">芝加哥联储全国活动指数(MA3) <span id="status3"></span></h4>
            <div class="relative h-64"><canvas id="chart3"></canvas></div>
        </div>
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">实际政策利率 vs 通胀 <span id="status4"></span></h4>
            <div class="relative h-64"><canvas id="chart4"></canvas></div>
        </div>
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">高收益债信用利差 <span id="status5"></span></h4>
            <div class="relative h-64"><canvas id="chart5"></canvas></div>
        </div>
        <div class="glass rounded-lg p-4">
            <h4 class="text-sm text-slate-400 mb-3">衰退概率历史趋势 <span class="text-xs text-slate-500">(拟合)</span></h4>
            <div class="relative h-64"><canvas id="chart6"></canvas></div>
        </div>
    </div>

    <script>
        // 配置：Worker 地址（备用）
        const WORKER_URL = 'https://fred-proxy.raistlin1314.workers.dev';
        // 标记数据源模式
        let dataSourceMode = 'unknown'; // 'static', 'worker', 'demo'
        let charts = {};
        let errorMessages = [];
        
        // 生成模拟数据
        function generateDemoData(baseValue, variance, count = 36) {
            const dates = Array.from({length: count}, (_, i) => {
                const d = new Date();
                d.setMonth(d.getMonth() - (count - 1 - i));
                return d.toISOString().split('T')[0];
            });
            return dates.map((date, i) => {
                const trend = Math.sin(i / 6) * (variance * 0.8);
                const noise = (Math.random() - 0.5) * variance;
                return { date, value: baseValue + trend + noise };
            });
        }

        // 优先读取本地静态数据（国内可访问），失败时回退到 Worker
        async function fetchWithFallback(series, baseValue, variance, chartNum, months = 36) {
            // 方案1：尝试读取同域名的静态 JSON（GitHub Actions 生成，国内畅通）
            try {
                const staticUrl = `./data/${series}.json?t=${Date.now()}`; // 加时间戳防缓存
                const response = await fetch(staticUrl, { 
                    method: 'GET',
                    cache: 'no-cache' // 确保获取最新
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.observations && data.observations.length > 0) {
                        const processed = data.observations
                            .filter(d => d.value !== '.' && d.value !== '' && d.value !== null)
                            .map(d => ({ date: d.date, value: parseFloat(d.value) }))
                            .reverse();
                        
                        document.getElementById(`status${chartNum}`).innerHTML = '<span class="static-badge">● 已同步</span>';
                        if (dataSourceMode === 'unknown') dataSourceMode = 'static';
                        return processed;
                    }
                }
            } catch (e) {
                console.log(`Static data not found for ${series}, trying Worker...`);
            }
            
            // 方案2：回退到 Cloudflare Worker（需要代理）
            try {
                const url = `${WORKER_URL}?series=${series}&limit=${months}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.message || 'Worker error');
                }
                
                const processed = data.observations
                    .filter(d => d.value !== '.' && d.value !== '' && d.value !== null)
                    .map(d => ({ date: d.date, value: parseFloat(d.value) }))
                    .reverse();
                
                document.getElementById(`status${chartNum}`).innerHTML = '<span class="live-badge">● 实时</span>';
                if (dataSourceMode === 'unknown') dataSourceMode = 'worker';
                return processed;
                
            } catch (error) {
                console.error(`${series} failed:`, error);
                errorMessages.push(series);
                
                // 方案3：本地生成演示数据
                document.getElementById(`status${chartNum}`).innerHTML = '<span class="demo-badge">演示数据</span>';
                if (dataSourceMode === 'unknown') dataSourceMode = 'demo';
                return generateDemoData(baseValue, variance, months);
            }
        }

        // 计算PCE同比
        function calculateYoY(priceData) {
            if (priceData.length < 13) return [];
            return priceData.slice(12).map((d, i) => {
                const prev = priceData[i].value;
                return { date: d.date, value: ((d.value - prev) / prev) * 100 };
            });
        }

        // 萨姆规则
        function calculateSahm(unemploymentData) {
            if (unemploymentData.length < 13) return [];
            return unemploymentData.slice(12).map((d, i) => {
                const idx = i + 12;
                const current3m = (unemploymentData[idx].value + unemploymentData[idx-1].value + unemploymentData[idx-2].value) / 3;
                const min12m = Math.min(...unemploymentData.slice(idx-11, idx+1).map(x => x.value));
                return { date: d.date, value: current3m - min12m };
            });
        }

        async function loadAllData() {
            // 显示加载状态
            document.getElementById('network-status').style.display = 'block';
            document.getElementById('connStatus').textContent = '● 获取数据中...';
            errorMessages = [];
            
            try {
                // 并行获取所有数据
                const [yieldSpread, unemployment, cfnai, fedFunds, pceIndex, creditSpread] = await Promise.all([
                    fetchWithFallback('T10Y2Y', -0.2, 0.4, 1, 36),
                    fetchWithFallback('UNRATE', 3.8, 0.4, 2, 36),
                    fetchWithFallback('CFNAIMA3', -0.2, 0.5, 3, 36),
                    fetchWithFallback('FEDFUNDS', 5.0, 0.2, 4, 36),
                    fetchWithFallback('PCEPILFE', 127, 2, 4, 48),
                    fetchWithFallback('BAMLH0A0HYM2', 400, 50, 5, 36)
                ]);
                
                // 计算衍生指标
                const coreInflationYoY = calculateYoY(pceIndex);
                const sahm = calculateSahm(unemployment);
                
                updateDashboard(yieldSpread, unemployment, cfnai, fedFunds, pceIndex, coreInflationYoY, sahm, creditSpread);
                
                // 更新状态栏
                const statusEl = document.getElementById('connStatus');
                const statusDiv = document.getElementById('network-status');
                
                if (dataSourceMode === 'static') {
                    statusEl.textContent = '● 数据已同步';
                    statusEl.className = 'text-blue-400 text-sm';
                    document.getElementById('status-text').textContent = '✓ 已加载同步数据（每6小时自动更新）';
                    statusDiv.style.background = 'linear-gradient(90deg, #3b82f6, #2563eb)';
                } else if (dataSourceMode === 'worker') {
                    statusEl.textContent = '● 实时连接';
                    statusEl.className = 'text-green-400 text-sm';
                    document.getElementById('status-text').textContent = '✓ 已连接实时数据源';
                    statusDiv.style.background = 'linear-gradient(90deg, #22c55e, #16a34a)';
                } else {
                    statusEl.textContent = '● 演示模式';
                    statusEl.className = 'text-yellow-400 text-sm';
                    document.getElementById('status-text').textContent = '⚠️ 当前显示演示数据，请检查网络';
                    statusDiv.style.background = 'linear-gradient(90deg, #eab308, #ca8a04)';
                }
                
                // 3秒后隐藏状态栏
                setTimeout(() => {
                    document.getElementById('network-status').style.display = 'none';
                }, 3000);
                
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('status-text').textContent = '加载失败，请刷新重试';
            }
        }

        function updateDashboard(yieldSpread, unemployment, cfnai, fedFunds, pceIndex, coreInflationYoY, sahm, creditSpread) {
            const getLatest = (arr) => arr.length > 0 ? arr[arr.length - 1].value : 0;
            
            const current = {
                yield: getLatest(yieldSpread),
                unemp: getLatest(unemployment),
                cfnai: getLatest(cfnai),
                sahm: getLatest(sahm),
                nominalRate: getLatest(fedFunds),
                inflation: getLatest(coreInflationYoY),
                realRate: getLatest(fedFunds) - getLatest(coreInflationYoY),
                creditSpread: getLatest(creditSpread)
            };

            // 评分算法
            let score = 0;
            let breakdown = [];
            
            let yieldScore = 0;
            if (current.yield < 0) {
                yieldScore = 35;
                if (current.yield < -0.5) yieldScore += 5;
            } else if (current.yield < 0.25) {
                yieldScore = 15;
            }
            score += yieldScore;
            breakdown.push(`曲线${yieldScore}分`);

            let realRateScore = 0;
            if (current.realRate > 3.5) realRateScore = 25;
            else if (current.realRate > 2.5) realRateScore = 15;
            else if (current.realRate > 1.5) realRateScore = 8;
            score += realRateScore;
            breakdown.push(`实际利率${realRateScore}分`);

            let sahmScore = 0;
            if (current.sahm > 0.5) sahmScore = 20;
            else if (current.sahm > 0.3) sahmScore = 10;
            score += sahmScore;
            breakdown.push(`萨姆${sahmScore}分`);

            let cfnaiScore = 0;
            if (current.cfnai < -0.7) cfnaiScore = 15;
            else if (current.cfnai < -0.2) cfnaiScore = 8;
            else if (current.cfnai < 0) cfnaiScore = 3;
            score += cfnaiScore;
            breakdown.push(`CFNAI${cfnaiScore}分`);

            let creditScore = 0;
            if (current.creditSpread > 600) creditScore = 5;
            else if (current.creditSpread > 500) creditScore = 3;
            score += creditScore;
            breakdown.push(`信用利差${creditScore}分`);

            score = Math.min(100, Math.max(0, score));

            // UI更新
            document.getElementById('recessionScore').textContent = score + '%';
            document.getElementById('recessionScore').className = 'text-4xl font-bold ' + 
                (score > 70 ? 'text-red-400 warning-pulse' : score > 40 ? 'text-yellow-400' : 'text-green-400');
            
            const statusEl = document.getElementById('cycleStatus');
            if (score > 70) {
                statusEl.textContent = '⚠️ 高风险';
                statusEl.className = 'px-4 py-2 rounded-lg text-sm font-bold bg-red-900/50 text-red-200';
            } else if (score > 40) {
                statusEl.textContent = '⚡ 警戒期';
                statusEl.className = 'px-4 py-2 rounded-lg text-sm font-bold bg-yellow-900/50 text-yellow-200';
            } else {
                statusEl.textContent = '✅ 扩张期';
                statusEl.className = 'px-4 py-2 rounded-lg text-sm font-bold bg-green-900/50 text-green-200';
            }

            document.getElementById('analysisText').innerHTML = 
                `曲线${current.yield < 0 ? '倒挂' : '正常'}(${current.yield.toFixed(2)}%), ` +
                `实际利率${current.realRate.toFixed(1)}%, ` +
                `CFNAI ${current.cfnai.toFixed(2)}, ` +
                `萨姆${current.sahm.toFixed(2)}, ` +
                `利差${current.creditSpread.toFixed(0)}bps`;

            document.getElementById('scoreBreakdown').textContent = '评分构成: ' + breakdown.join(' | ');

            // Metrics
            const metrics = [
                { label: '10Y-2Y利差', value: current.yield.toFixed(2) + '%', color: current.yield < 0 ? 'text-red-400' : 'text-green-400' },
                { label: '失业率', value: current.unemp.toFixed(1) + '%', color: current.unemp > 4 ? 'text-yellow-400' : 'text-green-400' },
                { label: 'CFNAI-MA3', value: current.cfnai.toFixed(2), color: current.cfnai < -0.7 ? 'text-red-400' : current.cfnai < 0 ? 'text-yellow-400' : 'text-green-400', subtext: current.cfnai < -0.7 ? '衰退' : current.cfnai < 0 ? '低于趋势' : '扩张' },
                { label: '萨姆规则', value: current.sahm.toFixed(2), color: current.sahm > 0.5 ? 'text-red-400' : 'text-slate-300', subtext: current.sahm > 0.5 ? '信号' : '正常' },
                { label: '核心PCE同比', value: current.inflation.toFixed(1) + '%', color: current.inflation > 3 ? 'text-red-400' : 'text-green-400' },
                { label: '实际利率', value: current.realRate.toFixed(1) + '%', color: current.realRate > 2.5 ? 'text-red-400' : 'text-green-400' },
                { label: '高收益利差', value: current.creditSpread.toFixed(0) + 'bps', color: current.creditSpread > 500 ? 'text-red-400' : 'text-green-400', subtext: current.creditSpread > 500 ? '压力' : '正常' }
            ];

            document.getElementById('metricsGrid').innerHTML = metrics.map(m => `
                <div class="glass rounded-lg p-3 text-center metric-card">
                    <div class="text-xs text-slate-400 mb-1">${m.label}</div>
                    <div class="text-lg font-bold ${m.color}">${m.value}</div>
                    ${m.subtext ? `<div class="text-xs ${m.color} opacity-75">${m.subtext}</div>` : ''}
                </div>
            `).join('');

            // Charts
            createChart('chart1', yieldSpread, '利差(%)', '#60a5fa', 0, true);
            createChart('chart2', unemployment, '失业率(%)', '#a78bfa', null, false);
            createChart('chart3', cfnai, 'CFNAI-MA3', '#34d399', -0.7, true);
            createRealRateChart(fedFunds, coreInflationYoY);
            createChart('chart5', creditSpread, '利差(bps)', '#f472b6', 500, true);
            createScoreChart(score);
        }

        function createChart(id, data, label, color, threshold = null, showThreshold = false) {
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            
            const datasets = [{
                label: label,
                data: data.map(d => d.value),
                borderColor: color,
                backgroundColor: color + '20',
                fill: true,
                tension: 0.4,
                pointRadius: 2
            }];

            if (showThreshold && threshold !== null) {
                datasets.push({
                    label: '衰退阈值',
                    data: Array(data.length).fill(threshold),
                    borderColor: '#ef4444',
                    borderDash: [5, 5],
                    pointRadius: 0
                });
            }
            
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date.slice(0, 7)),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: showThreshold, labels: { color: '#94a3b8', font: {size: 10} } } },
                    scales: {
                        x: { ticks: { color: '#64748b', maxTicksLimit: 6, font: {size: 10} }, grid: { display: false } },
                        y: { ticks: { color: '#64748b', font: {size: 10} }, grid: { color: '#334155' } }
                    }
                }
            });
        }

        function createRealRateChart(fedFunds, inflation) {
            const ctx = document.getElementById('chart4').getContext('2d');
            if (charts.chart4) charts.chart4.destroy();
            
            const dateMap = new Map();
            fedFunds.forEach(d => dateMap.set(d.date, { nominal: d.value }));
            inflation.forEach(d => {
                if (dateMap.has(d.date)) dateMap.get(d.date).inflation = d.value;
            });
            
            const aligned = Array.from(dateMap.entries())
                .filter(([_, vals]) => vals.inflation !== undefined)
                .map(([date, vals]) => ({ date, nominal: vals.nominal, inflation: vals.inflation, real: vals.nominal - vals.inflation }));
            
            charts.chart4 = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: aligned.map(d => d.date.slice(0, 7)),
                    datasets: [
                        { label: '名义利率', data: aligned.map(d => d.nominal), borderColor: '#3b82f6', borderWidth: 2, pointRadius: 2, tension: 0.4 },
                        { label: '核心PCE同比', data: aligned.map(d => d.inflation), borderColor: '#fbbf24', borderWidth: 2, pointRadius: 2, tension: 0.4 },
                        { label: '实际利率', data: aligned.map(d => d.real), borderColor: '#ef4444', borderDash: [5,5], borderWidth: 2, pointRadius: 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: {size: 10} } } },
                    scales: { x: { ticks: { color: '#64748b', font: {size: 10} }, grid: { color: '#334155' } }, y: { ticks: { color: '#64748b', font: {size: 10} }, grid: { color: '#334155' } } }
                }
            });
        }

        function createScoreChart(currentScore) {
            const ctx = document.getElementById('chart6').getContext('2d');
            if (charts.chart6) charts.chart6.destroy();
            
            const history = Array.from({length: 12}, (_, i) => {
                const d = new Date();
                d.setMonth(d.getMonth() - (11 - i));
                return { date: d.toISOString().split('T')[0], value: Math.max(5, Math.min(80, currentScore + (Math.random() - 0.5) * 20)) };
            });
            
            charts.chart6 = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(d => d.date.slice(0, 7)),
                    datasets: [{
                        label: '衰退概率评分',
                        data: history.map(d => d.value),
                        borderColor: currentScore > 70 ? '#ef4444' : currentScore > 40 ? '#eab308' : '#22c55e',
                        backgroundColor: (currentScore > 70 ? '#ef4444' : currentScore > 40 ? '#eab308' : '#22c55e') + '20',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }, {
                        label: '警戒线',
                        data: Array(12).fill(70),
                        borderColor: '#ef4444',
                        borderDash: [5, 5],
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', font: {size: 10} }, grid: { display: false } },
                        y: { ticks: { color: '#64748b', font: {size: 10} }, grid: { color: '#334155' }, min: 0, max: 100 }
                    }
                }
            });
        }

        // 启动加载
        loadAllData();
    </script>
</body>
</html>
